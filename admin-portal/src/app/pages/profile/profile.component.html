<div class="row">
  <div class="col-sm-12 col-lg-8 col-xl-6">
    <app-card cardTitle="Profile">
      <p class="text-muted mb-3">
        Update your display name. Your email and role come from your account on the Survey API.
      </p>

      <div class="mb-3">
        <label class="form-label" for="name">Display name *</label>
        <input
          id="name"
          type="text"
          class="form-control"
          [(ngModel)]="name"
          placeholder="Your name"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [value]="email" disabled />
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <input type="text" class="form-control" [value]="role || '—'" disabled />
      </div>

      <div class="d-flex align-items-center gap-2 mt-2">
        <button type="button" class="btn btn-primary" [disabled]="!name?.trim()" (click)="save()">
          Save changes
        </button>
        @if (saved) {
          <span class="text-success small">Saved. Your new name is now used in the header.</span>
        }
      </div>

      <hr class="my-4" />

      <p class="text-muted small mb-1">
        Need to change your email, role, or password?
      </p>
      <p class="text-muted small mb-0">
        Admins can update accounts on the
        <a routerLink="/users">Users</a> page.
      </p>
    </app-card>
  </div>
</div>
